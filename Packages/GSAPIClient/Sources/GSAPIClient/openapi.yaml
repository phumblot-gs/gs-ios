  /picture/aggregate:
    get:
      summary: Search pictures with an aggregation criteria
      operationId: getPictureAggregate
      description: "\nYou can filter by giving query parameters with the same logic as the GET /picture endpoint.\nWhat is different is that you can group by a field using the group_by_field parameter.\n\nPagination logic is the same as the GET /picture endpoint except that you can't use the sample_size header to set the size of the aggregation samples (number of items in each aggregation).\n\nYou can sort the aggregation results using the sort_by parameter. Supported fields include date_cre, reference_ref, and other fields that can be used for grouping. Add a '+'/'-' character before the field name to specify ascending or descending order (e.g., sort_by=+reference_ref or sort_by=-date_cre).\n\nResponse headers: \n* 'X-Total-Count': Total number of items\n* 'X-Offset': Offset of the result\n* 'X-Count': Size of the result\n\t\t\t"
