security:
- Bearer: []
tags: []
paths:
  /broadcast:
    get:
      summary: List broadcasts
      operationId: getBroadcast
      description: "\nReturn an array of broadcasts with a pagination.\n\nYou can set the offset of pagination with the header 'offset'.\nResponse headers:\n * 'X-Total-Count': Total number of items\n * 'X-Offset': Offset of the result\n * 'X-Count': Size of the result\n"
      tags:
      - broadcast
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model2'
    post:
      summary: Create broadcast
      operationId: postBroadcast
      description: You can create only 10 broadcasts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Model72'
      tags:
      - broadcast
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model73'
  /picture:
    get:
      summary: List pictures
      operationId: getPicture
      description: "\nReturn an array of pictures with a pagination of 100.\n\nYou can filter by giving query parameters with the following logic :\n * picturestatus=50 : filter pictures with picturestatus = 50\n * picturestatus=50&picturestatus=40 : filter pictures with picturestatus = 50 OR picturestatus = 40\n * picturestatus=gte:50 : filter pictures with picturestatus greater than or equal to 50 (available options are gt gte lt lte)\n * picturestatus=gte:50&picturestatus=lte:55 : filter pictures with picturestatus greater than or equal to 50 AND less than or equal to 55\n\n\nYou can set the offset of pagination with the header 'offset'.\nResponse headers: \n * 'X-Total-Count': Total number of items\n * 'X-Offset': Offset of the result\n * 'X-Count': Size of the result\n\nThere are limitations as you can't go beyond 10000 using the offset header. If you need to retreive more data, you can use the search parameter with \"gte:last value retreived\" in combination with the sort_by parameter.\n\
        \nExample:\n * first call: picture_id=gte:0&sort_by=picture_id\n * second call: picture_id=gte:100&sort_by=picture_id\n * third call: picture_id=gte:200&sort_by=picture_id\n * etc...\n\n"
      parameters:
      - description: offset for pagination, you can't go beyond 10000
        name: offset
        in: header
        schema:
          type: number
          minimum: 0
          maximum: 10000
      - description: id of the picture
        name: picture_id
        in: query
        schema:
          type: string
      - description: id of the bench the picture belongs to
        name: bench_id
        in: query
        schema:
          type: string
      - description: id of the bench the picture belongs to
        name: bench_root_id
        in: query
        schema:
          type: string
      - description: workflow step of production
        name: benchsteptype
        in: query
        schema:
          type: string
      - description: ref extracted from picture
        name: ref
        in: query
        schema:
          type: string
      - description: ref value of linked reference from catalog
        name: reference_ref
        in: query
        schema:
          type: string
      - description: path of the picture in the repository
        name: path
        in: query
        schema:
          type: string
      - description: path of the picture
        name: file_path
        in: query
        schema:
          type: string
      - description: picture filename
        name: smalltext
        in: query
        schema:
          type: string
      - description: "###### Worlflow step of the picture.\n\t\t1 : ignored\n\t\t5 : to reshoot\n\t\t10 : not selected\n\t\t30 : selected\n\t\t31 : refused\n\t\t35 : refused\n\t\t40 : submited for approval\n\t\t50 : validated\n\t\t51 : ready to broadcast (in case of manual broadcast)\n\t\t52 : error during broadcast\n\t\t55 : broadcast (once validated a picture can be broadcast on )\n\t\t80 : archived\n\t"
        name: picturestatus
        in: query
        schema:
          type: string
      - description: filesize
        name: filesize
        in: query
        schema:
          type: string
      - description: width
        name: width
        in: query
        schema:
          type: string
      - description: height
        name: height
        in: query
        schema:
          type: string
      - description: reference_id
        name: reference_id
        in: query
        schema:
          type: string
      - description: parent picture
        name: parent_id
        in: query
        schema:
          type: string
      - description: icc profile of image
        name: icc_profile
        in: query
        schema:
          type: string
      - description: url of thumbnail
        name: thumbnail
        in: query
        schema:
          type: string
      - description: hash computed from image content
        name: hash
        in: query
        schema:
          type: string
      - description: identifier of file content
        name: file_id
        in: query
        schema:
          type: string
      - description: view type code
        name: view_type_code
        in: query
        schema:
          type: string
      - description: transfert date of the picture (in Grand Shooting)
        name: transfer_date
        in: query
        schema:
          type: string
      - description: creation date of the picture (in Grand Shooting)
        name: date_cre
        in: query
        schema:
          type: string
      - description: last modification date of the picture (in Grand Shooting)
        name: date_mod
        in: query
        schema:
          type: string
      - description: Validation date
        name: validation_date
        in: query
        schema:
          type: string
      - description: name of the export
        name: export
        in: query
        schema:
          type: string
      - description: status of export
        name: exportpicturestatus
        in: query
        schema:
          type: string
      - description: name of the shooting method
        name: shootingmethod
        in: query
        schema:
          type: string
      - description: ID of look
        name: look_id
        in: query
        schema:
          type: string
      - description: alerts
        name: alerts
        in: query
        schema:
          type: string
      - description: Sort search. Add a '+'/'-' character before to specify the sorting order as ascending or descending.
        name: sort_by
        in: query
        schema:
          type: string
      - description: tags
        name: taginfo.tags
        in: query
        schema:
          type: string
      - description: label
        name: taginfo.label
        in: query
        schema:
          type: string
      - description: rating
        name: taginfo.rating
        in: query
        schema:
          type: string
      - description: reference_ids
        name: reference_ids
        in: query
        schema:
          type: string
      - description: refs
        name: refs
        in: query
        schema:
          type: string
      - description: child_ids
        name: child_ids
        in: query
        schema:
          type: string
      - description: search string
        name: search
        in: query
        schema:
          type: string
      - description: activates wildcard search
        name: search_wildcard
        in: query
        schema:
          type: boolean
          default: true
      - description: Account id for delegation usage
        name: account_id
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
      - description: Account id for delegation usage
        name: target_account_id
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
      tags:
      - picture
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pictures'
  /production:
    get:
      summary: List productions
      operationId: getProduction
      description: 'Retrieves a list of productions. By default, only active productions are included (archived=false).

        To retrieve all productions including archived ones, use the query parameter ?archived=true'
      parameters:
      - description: Bench label
        name: smalltext
        in: query
        schema:
          type: string
      - description: Start date
        name: startdate
        in: query
        schema:
          type: string
          format: date
      - description: End date
        name: enddate
        in: query
        schema:
          type: string
          format: date
      - description: Timezone
        name: timezone
        in: query
        schema:
          type: string
      - description: Timezone offset
        name: tzoffset
        in: query
        schema:
          type: number
      - description: Shooting method ID
        name: shooting_method_id
        in: query
        schema:
          type: number
      - description: Bench ID
        name: bench_id
        in: query
        schema:
          type: number
          minimum: 1
      - description: Parent ID
        name: parent_id
        in: query
        schema:
          type: number
          minimum: 1
      - description: Root ID
        name: root_id
        in: query
        schema:
