      - description: size for pagination
        name: size
        in: header
        schema:
          type: number
          minimum: 0
          maximum: 100
      - description: offset for pagination
        name: offset
        in: header
        schema:
          type: number
          minimum: 0
          maximum: 10000
      - description: size for aggregation samples
        name: sample_size
        in: header
        schema:
          type: number
          minimum: 1
          maximum: 5
