  /reference/tag:
    put:
      summary: Bulk update reference tags
      operationId: putReferenceTag
      description: "\nModify tags on multiple references in a single request. The same tags update will be applied to all specified references. This endpoint supports partial updates: only tags mentioned in the request are modified, existing tags not mentioned remain unchanged.\n\n**Request Body Format:**\n```json\n{\n  \"reference_id\": [431315, 431318, 431320],\n  \"tags\": {\n    \"TAG1\": true,\n    \"TAG2\": false\n  }\n}\n```\n\n- `reference_id`: Array of reference IDs (numbers) to update (required, minimum 1 item)\n- `tags`: Object where keys are tag names and values are booleans (required)\n  - `true`: Add/keep the tag\n  - `false`: Remove the tag\n\n**Behavior:**\n- The same tags update is applied to all specified references\n- Tags set to `true` will be added or kept on each reference\n- Tags set to `false` will be removed from each reference\n- Tags not mentioned in the request remain unchanged on each reference\n- Each reference is processed independently\n\n**Response Format:**\n\
        \n**Success (200 OK):**\nWhen all references are updated successfully, returns an object mapping reference IDs to their updated tags:\n```json\n{\n  \"431315\": {\n    \"TAG1\": true,\n    \"OLD_TAG\": true\n  },\n  \"431318\": {\n    \"TAG1\": true,\n    \"OLD_TAG1\": true\n  },\n  \"431320\": {\n    \"TAG1\": true\n  }\n}\n```\n\n**Partial Success (207 Multi-Status):**\nWhen some references succeed and some fail, returns:\n```json\n{\n  \"succeeded\": [\"431315\", \"431318\"],\n  \"failed\": [\n    {\n      \"reference_id\": \"431320\",\n      \"error\": \"Reference not found\"\n    }\n  ]\n}\n```\n\n**HTTP Status Codes:**\n- `200 OK`: All references updated successfully\n- `207 Multi-Status`: Some references succeeded, some failed (check `succeeded` and `failed` arrays)\n- `404 Not Found`: All references failed (if all reference_ids are invalid or not found)\n- `400 Bad Request`: Invalid payload format (missing required fields, invalid types)\n\n**Error Handling:**\n- Invalid\
        \ or non-existent reference IDs are included in the `failed` array with appropriate error messages\n- Valid references are still processed even if some fail\n- Each reference is processed sequentially\n\t\t\t"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Model122'
      tags:
      - Reference - Tag
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model123'
  /webhook/{webhook_id}:
