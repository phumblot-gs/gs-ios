  /reference/{reference_id}/tag:
    get:
      summary: Get reference tags
      operationId: getReferenceReference_idTag
      description: "\nRetrieve all tags associated with a specific reference.\n\n**Response Format:**\nReturns an object where keys are tag names and values are always `true`.\n\n**Example Response:**\n```json\n{\n  \"TAG1\": true,\n  \"TAG2\": true\n}\n```\n\n**HTTP Status Codes:**\n- `200 OK`: Tags retrieved successfully\n- `404 Not Found`: Reference does not exist\n- `400 Bad Request`: Invalid reference_id format\n\t\t\t"
      parameters:
      - description: the id for the reference item
        name: reference_id
        in: path
        required: true
        schema:
          type: number
      tags:
      - Reference - Tag
      responses:
        '200':
          description: Meta tag of reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reference_tags'
    put:
      summary: Update reference tags
      operationId: putReferenceReference_idTag
      description: "\nModify tags on a specific reference. This endpoint supports partial updates: only tags mentioned in the request are modified, existing tags not mentioned remain unchanged.\n\n**Request Body Format:**\nSend tags as an object where:\n- Keys are tag names (strings)\n- Values are booleans:\n  - `true`: Add the tag if it doesn't exist, or keep it if it already exists\n  - `false`: Remove the tag from the reference\n\n**Example Request:**\n```json\n{\n  \"TAG1\": true,\n  \"TAG2\": false,\n  \"NEW_TAG\": true\n}\n```\n\n**Behavior:**\n- Tags set to `true` will be added or kept\n- Tags set to `false` will be removed\n- Tags not mentioned in the request remain unchanged\n- The update is partial: you only need to send the tags you want to modify\n\n**Response Format:**\nReturns the updated tags object (same format as GET endpoint) with all current tags set to `true`.\n\n**Example Response:**\n```json\n{\n  \"TAG1\": true,\n  \"NEW_TAG\": true\n}\n```\n\n**HTTP Status Codes:**\n\
        - `200 OK`: Tags updated successfully\n- `404 Not Found`: Reference does not exist\n- `400 Bad Request`: Invalid reference_id format or invalid payload\n\t\t\t"
      parameters:
      - description: the id for the reference item
        name: reference_id
        in: path
        required: true
        schema:
          type: number
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Model121'
      tags:
      - Reference - Tag
      responses:
        '200':
          description: Meta tag of reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reference_tags'
