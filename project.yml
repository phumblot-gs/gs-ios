# xcodegen project spec for GS Mobile.
# Regenerate the Xcode project with: bin/bootstrap.sh
name: GSApp
options:
  bundleIdPrefix: com.grandshooting
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    DEVELOPMENT_TEAM: ""  # TODO: fill in your Apple Developer team ID
    CODE_SIGN_STYLE: Automatic

packages:
  GSCore:
    path: Packages/GSCore
  GSAPIClient:
    path: Packages/GSAPIClient
  GSScanner:
    path: Packages/GSScanner
  GSCamera:
    path: Packages/GSCamera
  GSLiDAR:
    path: Packages/GSLiDAR
  GSPackshot:
    path: Packages/GSPackshot
  GSLogistics:
    path: Packages/GSLogistics

targets:
  GSApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: GSApp
    info:
      path: GSApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grandshooting.gsmobile
        PRODUCT_NAME: GSApp
        INFOPLIST_FILE: GSApp/Info.plist
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.2"
    dependencies:
      - package: GSCore
      - package: GSAPIClient
      - package: GSScanner
      - package: GSCamera
      - package: GSLiDAR
      - package: GSPackshot
      - package: GSLogistics

schemes:
  GSApp:
    build:
      targets:
        GSApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
