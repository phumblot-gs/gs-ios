# xcodegen project spec for GS Mobile.
# Regenerate the Xcode project with: bin/bootstrap.sh
name: GSApp
options:
  bundleIdPrefix: com.grandshooting
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug
  developmentLanguage: en
  knownRegions:
    - en
    - fr
    - pl
    - Base

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    DEVELOPMENT_TEAM: "545V88LR3Z"
    CODE_SIGN_STYLE: Automatic

packages:
  GSCore:
    path: Packages/GSCore
  GSAPIClient:
    path: Packages/GSAPIClient
  GSScanner:
    path: Packages/GSScanner
  GSCamera:
    path: Packages/GSCamera
  GSLiDAR:
    path: Packages/GSLiDAR
  GSPackshot:
    path: Packages/GSPackshot
  GSLogistics:
    path: Packages/GSLogistics

targets:
  GSApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: GSApp
    # All Info.plist contents live here so xcodegen regenerates them
    # consistently on every `bin/bootstrap.sh`. Edits made directly to
    # GSApp/Info.plist would be overwritten — change this block instead.
    info:
      path: GSApp/Info.plist
      properties:
        CFBundleDisplayName: GS Mobile
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        NSCameraUsageDescription: GS Mobile uses the camera to scan product barcodes, take photos, and run LiDAR measurements.
        NSMotionUsageDescription: GS Mobile reads device motion (gyroscope) to detect when you hold the device still and auto-lock measurement points.
        NSPhotoLibraryUsageDescription: GS Mobile can save captured product photos to your library.
        NSPhotoLibraryAddUsageDescription: GS Mobile can save captured product photos and packshots to your library.
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.grandshooting.gsmobile
            CFBundleURLSchemes:
              - gsmobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grandshooting.gsmobile
        PRODUCT_NAME: GSApp
        INFOPLIST_FILE: GSApp/Info.plist
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GSCore
      - package: GSAPIClient
      - package: GSScanner
      - package: GSCamera
      - package: GSLiDAR
      - package: GSPackshot
      - package: GSLogistics

schemes:
  GSApp:
    build:
      targets:
        GSApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
